services:
  # The Laravel Web App (Running both Server and Queue worker on Free plan)
  - type: web
    name: placement-test-backend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: "./scripts/start.sh"
    plan: free
    region: ohio
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: "https://placement-test-backend.onrender.com"
      - key: FRONTEND_URL
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: placement-test-db
          property: connectionString
      - key: QUEUE_CONNECTION
        value: database
      - key: CACHE_STORE
        value: database
      - key: GEMINI_API_KEY
        sync: false

databases:
  # Native Managed PostgreSQL (Free Tier - 90 Days)
  - name: placement-test-db
    databaseName: placement_test
    user: m2
    plan: free
    region: ohio
